<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1b"/>
      <stop offset="100%" stop-color="#121213"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tile background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- Green border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#6AAA64" stroke-width="2.5"/>
  <!-- Corner accent dots -->
  <circle cx="5" cy="5" r="1.2" fill="#6AAA64" opacity="0.6"/>
  <circle cx="27" cy="5" r="1.2" fill="#6AAA64" opacity="0.6"/>
  <circle cx="5" cy="27" r="1.2" fill="#6AAA64" opacity="0.6"/>
  <circle cx="27" cy="27" r="1.2" fill="#6AAA64" opacity="0.6"/>
  <!-- Glowing F -->
  <text x="16" y="23" text-anchor="middle"
        font-family="Trebuchet MS, Helvetica, sans-serif"
        font-size="21" font-weight="bold"
        fill="#6AAA64" filter="url(#glow)">F</text>
</svg>
